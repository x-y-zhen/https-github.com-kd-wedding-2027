<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Our Wedding</title>
    <meta name="description" content="A beautiful wedding website template you can personalize." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=3" />
    <script src="config.js"></script>
  </head>
  <body>
    <div id="passwordGate" class="password-gate">
      <div class="password-card">
        <h2>Access required</h2>
        <p>Please enter the password to view this wedding website.</p>
        <form id="passwordForm" class="password-form">
          <input type="password" id="passwordInput" placeholder="Enter password" autocomplete="current-password" required />
          <button type="submit">Enter</button>
        </form>
        <p id="passwordError" class="password-error" aria-live="polite"></p>
      </div>
    </div>

    <script>
      const config = window.WEDDING_CONFIG || {};
      const PASSWORD = config.password || 'copper';
      const ACCESS_KEY = config.accessStorageKey || 'weddingAccess';
      const gate = document.getElementById('passwordGate');
      const form = document.getElementById('passwordForm');
      const input = document.getElementById('passwordInput');
      const error = document.getElementById('passwordError');

      function grantAccess() {
        window.localStorage.setItem(ACCESS_KEY, 'granted');
        window.sessionStorage.setItem(ACCESS_KEY, 'granted');
      }

      function redirectToSite() {
        window.location.href = 'wedding.html';
      }

      function handlePasswordSubmit(event) {
        event.preventDefault();
        const enteredPassword = input.value.trim().toLowerCase();

        if (enteredPassword === PASSWORD.toLowerCase()) {
          grantAccess();
          redirectToSite();
        } else {
          error.textContent = 'That password is incorrect. Please try again.';
          input.value = '';
          input.focus();
        }
      }

      if (window.localStorage.getItem(ACCESS_KEY) === 'granted' || window.sessionStorage.getItem(ACCESS_KEY) === 'granted') {
        redirectToSite();
      }

      form.addEventListener('submit', handlePasswordSubmit);
    </script>
  </body>
</html>
